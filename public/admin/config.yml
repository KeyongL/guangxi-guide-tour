# Decap CMS config (F063). Local desktop mode only — zero database, zero
# OAuth, zero server beyond the local `decap-server` proxy (`npm run
# cms:proxy`). Fields below mirror src/content.config.ts exactly; that file
# stays the enforced source of truth at build time (`npm run build`), this
# config only makes editing it easier for non-technical editors.

backend:
  name: git-gateway

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "guides"
    label: "Guides"
    folder: "content/guides"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text", hint: "1-2 sentence teaser shown in cards and search results." }
      - { label: "Region", name: "region", widget: "string" }
      - label: "Visa Zone"
        name: "visa_zone"
        widget: "select"
        hint: "Chongzuo/Baise pages MUST be non-twov, or the build fails (F033 guardrail)."
        options:
          - { label: "TWOV — inside the 240h transit visa-free zone", value: "twov" }
          - { label: "Non-TWOV — outside the transit zone (e.g. Chongzuo, Baise)", value: "non-twov" }
      - { label: "URL Slug", name: "slug", widget: "string", required: false, hint: "Routing slug, e.g. detian-waterfall-friendship-pass. Leave blank to fall back to the filename." }
      - { label: "Cover Photo", name: "cover", widget: "image", required: false, hint: "Real photo only, no AI-generated images. Drag & drop or pick from the media library. Leave blank to keep the flat placeholder block." }
      - label: "Verified On"
        name: "verified"
        widget: "datetime"
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
        hint: "Date this guide's facts were last checked on the ground. Leave blank if not yet verified."
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "cities"
    label: "Cities"
    folder: "content/cities"
    create: true
    extension: "md"
    format: "frontmatter"
    identifier_field: "name_en"
    fields:
      - { label: "English Name", name: "name_en", widget: "string" }
      - { label: "Local Name", name: "name_local", widget: "string", hint: "Chinese or local-script name, e.g. 北海." }
      - { label: "Region", name: "region", widget: "string" }
      - label: "Visa Zone"
        name: "visa_zone"
        widget: "select"
        options:
          - { label: "TWOV — inside the 240h transit visa-free zone", value: "twov" }
          - { label: "Non-TWOV — outside the transit zone", value: "non-twov" }
      - { label: "Suggested Days", name: "days", widget: "number", value_type: "int", min: 1 }
      - { label: "Must Eat", name: "must_eat", widget: "list", hint: "One dish per line, e.g. Steamed scallops with garlic 蒜蓉粉丝扇贝 (~¥8/piece)." }
      - { label: "Attractions", name: "attractions", widget: "list", hint: "One attraction per line." }
      - { label: "Activity Level", name: "activity_level", widget: "string", hint: "Free text, e.g. Chill, Moderate, Adventurous." }
      - { label: "Adventure Hook", name: "adventure_hook", widget: "string", hint: "The one signature hardcore activity for thrill-seeking readers." }
      - { label: "Daily Budget", name: "daily_budget", widget: "string", required: false, hint: "e.g. ¥250–400 (~$35–55)." }
      - label: "Budget Verified On"
        name: "budget_verified_on"
        widget: "datetime"
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
      - { label: "Flow Links", name: "flow_links", widget: "list", required: false, hint: "Guide URL paths that pass through this city, e.g. /guides/visa-free-transit-beihai." }
      - { label: "Body", name: "body", widget: "markdown" }
